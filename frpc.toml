# 1. 客户端公共配置 (连接到你的 frps 服务端)
serverAddr = "us.553423.xyz"     # 修改为你的 frp 服务端公网 IP 或域名
serverPort = 7000          # 修改为你的 frp 服务端通信端口 (通常默认是 7000)

# 认证配置 (推荐配置，需与服务端 frps.toml 保持一致)
[auth]
method = "token"
token = "553423889@qq.cn" # 修改为你的 frp 连接秘钥

# 2. 代理配置 (将本地的 sing-box 暴露出去)
[[proxies]]
name = "sing-box-tcp"      # 代理名称，在服务端必须唯一
type = "tcp"               # 代理类型，sing-box 通常需要 tcp (如果有 udp 需求可以再建一个)
localIP = "127.0.0.1"      # 本地 IP (详见下方说明)
localPort = 8080           # 本地 sing-box 监听的端口 (对应你 Dockerfile 里的 8080)
remotePort = 18080         # 映射到服务端的公网端口 (你访问公网IP:18080 就会转发到本地的 8080)


# (可选) 如果你的 sing-box 也需要 UDP 转发，可以解除下方注释：
# [[proxies]]
# name = "sing-box-udp"
# type = "udp"
# localIP = "127.0.0.1"
# localPort = 8080
# remotePort = 18080
